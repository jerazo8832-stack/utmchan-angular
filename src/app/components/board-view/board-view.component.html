<div *ngIf="board">
  <h1 class="board-title">{{ board.title }}</h1>

  <app-announcements *ngIf="boardSlug === 'inicio'"></app-announcements>

  <app-post-form [board]="boardSlug" [threadId]="null" (posted)="onPosted($event)"></app-post-form>

  <div *ngIf="!threads.length" class="empty-board-msg">
    Todavía no hay hilos en este tablón. ¡Sé el primero en publicar!
  </div>

  <div *ngFor="let hilo of threads" class="thread-block">
    <app-post-item
      [post]="hilo"
      [showBoardTag]="boardSlug === 'inicio'"
      (changed)="reload()"
    ></app-post-item>

    <div class="preview-replies" *ngIf="hilo.preview_replies?.length">
      <app-post-item
        *ngFor="let r of hilo.preview_replies"
        [post]="r"
        [isPreview]="true"
        [insideThread]="true"
        (changed)="reload()"
      ></app-post-item>
    </div>
  </div>
</div>
